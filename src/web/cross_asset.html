<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Yield - Cross-Asset Pricing</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="dashboard-wrapper"> 
        
        <header class="navbar">
            <div class="brand">Yield</div>
            <nav class="nav-links">
                <a href="index.html"><i class="fa-solid fa-calculator"></i> Curve Builder</a>
                <a href="docs.html"><i class="fa-solid fa-book-open"></i> Docs & Guide</a>
                <a href="cross_asset.html" class="active"><i class="fa-solid fa-right-left"></i> Cross-Asset Swap</a>
                <a href="https://www.animestats.tf/" target="_blank"><i class="fa-solid fa-wand-magic-sparkles"></i> Inspiration</a>
            </nav>
        </header>

        <main class="dashboard-grid">
            
            <div class="card configuration-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-sliders"></i> Swap Parameters</h2>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="notional">Notional Principal ($)</label>
                        <input type="number" id="notional" value="10000000" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="fixed-rate">Funding Leg Fixed Rate (%)</label>
                        <input type="number" id="fixed-rate" value="3.50" step="0.01" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="ticker">Underlying Asset Ticker</label>
                        <input type="text" id="ticker" placeholder="e.g., MU, GOOGL, CL=F" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="initial-price">Initial Asset Price ($)</label>
                        <input type="number" id="initial-price" class="form-control">
                    </div>
                    <div class="form-group">
                        <label for="tenor">Tenor (Years)</label>
                        <input type="number" id="tenor" value="1" class="form-control">
                    </div>
                    <button id="calculate-btn" class="btn btn-primary w-100 mt-3">
                        <i class="fa-solid fa-play"></i> Calculate Cross-Asset NPV
                    </button>
                </div>
            </div>

            <div class="card results-card">
                <div class="card-header">
                    <h2><i class="fa-solid fa-chart-line"></i> Valuation Engine Output</h2>
                </div>
                <div class="card-body dynamic-display">
                    <div id="results-panel" style="display: none;">
                        <div class="metric-row">
                            <span class="metric-label">Live Market Price:</span>
                            <span id="res-live-price" class="metric-value">--</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Calculated Asset Return:</span>
                            <span id="res-return" class="metric-value text-success">--</span>
                        </div>
                        <hr class="divider">
                        <div class="npv-display text-center">
                            <h3>Net Present Value (NPV)</h3>
                            <h2 id="res-npv" class="npv-highlight">$0.00</h2>
                        </div>
                    </div>
                    
                    <div id="placeholder-message" class="text-muted text-center py-5">
                        <i class="fa-solid fa-wand-magic-sparkles fa-2x mb-3"></i>
                        <p>Enter your trade parameters and run the valuation engine to generate cashflows.</p>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script src="cross_asset.js"></script>
</body>
</html>
